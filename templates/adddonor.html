<!DOCTYPE html>
<html>
<head>
    <title>Add Donor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-danger">
    <div class="container">
        <span class="navbar-brand">Blood Bank</span>
    </div>
</nav>

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3>Add Donor</h3>
        <form method="POST">
            <input type="text" name="name" class="form-control mb-3" placeholder="Name">
            <input type="number" name="age" class="form-control mb-3" placeholder="Age">
            <input type="text" name="gender" class="form-control mb-3" placeholder="Gender">
            <input type="text" name="bloodgroup" class="form-control mb-3" placeholder="Blood Group">
            <input type="date" name="lastdonationdate" class="form-control mb-3">
            <button class="btn btn-primary w-100">Submit</button>
        </form>
    </div>
</div>

</body>
</html>
