<!DOCTYPE html>
<html>
<head>
    <title>Add Request</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-danger">
    <div class="container">
        <span class="navbar-brand">Blood Bank</span>
    </div>
</nav>

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3>New Blood Request</h3>

        <form method="POST">
            <input type="text" name="bloodgroup" class="form-control mb-3" placeholder="Blood Group" required>
            <input type="number" name="units" class="form-control mb-3" placeholder="Units" required>
            <input type="number" name="hospitalid" class="form-control mb-3" placeholder="Hospital ID" required>

            <button class="btn btn-primary w-100">Submit</button>
        </form>

    </div>
</div>

</body>
</html>
