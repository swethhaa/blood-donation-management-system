<!DOCTYPE html>
<html>
<head>
    <title>Blood Stock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-danger">
    <div class="container">
        <span class="navbar-brand">Blood Bank</span>
        <div>
            <a href="/" class="text-white me-3">Donors</a>
            <a href="/bloodstock" class="text-white me-3">Stock</a>
            <a href="/hospitals" class="text-white me-3">Hospitals</a>
            <a href="/requests" class="text-white">Requests</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h3>Blood Stock</h3>
    <table class="table table-bordered mt-3">
        <tr><th>ID</th><th>Group</th><th>Units</th><th>Expiry</th></tr>
        {% for s in stock %}
        <tr>
            <td>{{ s[0] }}</td>
            <td>{{ s[1] }}</td>
            <td>{{ s[2] }}</td>
            <td>{{ s[3] }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
