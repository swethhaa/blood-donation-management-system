<!DOCTYPE html>
<html>
<head>
    <title>Donors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-danger">
    <div class="container">
        <span class="navbar-brand">Blood Bank</span>
        <div>
            <a href="/" class="text-white me-3">Donors</a>
            <a href="/bloodstock" class="text-white me-3">Stock</a>
            <a href="/hospitals" class="text-white me-3">Hospitals</a>
            <a href="/requests" class="text-white">Requests</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between">
        <h3>Donor List</h3>
        <a href="/add" class="btn btn-success">Add Donor</a>
    </div>

    <table class="table table-bordered mt-3">
        <tr>
            <th>ID</th><th>Name</th><th>Age</th><th>Gender</th><th>Blood Group</th><th>Date</th><th>Actions</th>
        </tr>
        {% for d in donors %}
        <tr>
            <td>{{ d[0] }}</td>
            <td>{{ d[1] }}</td>
            <td>{{ d[2] }}</td>
            <td>{{ d[3] }}</td>
            <td>{{ d[4] }}</td>
            <td>{{ d[5] }}</td>
            <td>
                <a href="/edit/{{ d[0] }}" class="btn btn-warning btn-sm">Edit</a>
                <a href="/delete/{{ d[0] }}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
