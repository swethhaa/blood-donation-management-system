<!DOCTYPE html>
<html>
<head>
    <title>Edit Donor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR (same as other pages) -->
<nav class="navbar navbar-dark bg-danger shadow-sm py-3 mb-4 border-bottom border-4 border-danger border-opacity-75">
    <div class="container d-flex justify-content-between align-items-center">
        <a href="/dashboard" class="navbar-brand fw-bold fs-4 mb-0 text-decoration-none">
            BloodNet
        </a>
        <div class="d-flex gap-2 flex-wrap">
            <a href="/dashboard" class="btn btn-outline-light border-0 px-3 fw-semibold">Dashboard</a>
            <a href="/donors" class="btn btn-outline-light border-0 px-3 fw-semibold">Donors</a>
            <a href="/bloodstock" class="btn btn-outline-light border-0 px-3 fw-semibold">Stock</a>
            <a href="/hospitals" class="btn btn-outline-light border-0 px-3 fw-semibold">Hospitals</a>
            <a href="/requests" class="btn btn-outline-light border-0 px-3 fw-semibold">Requests</a>
            <a href="/logout" class="btn btn-outline-light border-0 px-3 fw-semibold text-warning">Logout</a>
        </div>
    </div>
</nav>

<!-- FORM -->
<div class="container mt-5">

    <div class="card shadow-lg p-4">
        <h3 class="mb-4 text-center">Edit Donor Details</h3>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="name" value="{{ donor[1] }}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Age</label>
                <input type="number" name="age" value="{{ donor[2] }}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Gender</label>
                <select name="gender" class="form-control" required>
                    <option value="Male" {% if donor[3]=='Male' %}selected{% endif %}>Male</option>
                    <option value="Female" {% if donor[3]=='Female' %}selected{% endif %}>Female</option>
                    <option value="Other" {% if donor[3]=='Other' %}selected{% endif %}>Other</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Blood Group</label>
                <select name="bloodgroup" class="form-select" required>
                    <option value="" disabled>Select Blood Group</option>
                    <option value="A+" {% if donor[4]=='A+' %}selected{% endif %}>A+</option>
                    <option value="A-" {% if donor[4]=='A-' %}selected{% endif %}>A-</option>
                    <option value="B+" {% if donor[4]=='B+' %}selected{% endif %}>B+</option>
                    <option value="B-" {% if donor[4]=='B-' %}selected{% endif %}>B-</option>
                    <option value="AB+" {% if donor[4]=='AB+' %}selected{% endif %}>AB+</option>
                    <option value="AB-" {% if donor[4]=='AB-' %}selected{% endif %}>AB-</option>
                    <option value="O+" {% if donor[4]=='O+' %}selected{% endif %}>O+</option>
                    <option value="O-" {% if donor[4]=='O-' %}selected{% endif %}>O-</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Last Donation Date</label>
                <input type="date" name="lastdonationdate" value="{{ donor[5] }}" class="form-control">
            </div>

            <button class="btn btn-primary w-100">Update Donor</button>

        </form>
    </div>

</div>

</body>
</html>
