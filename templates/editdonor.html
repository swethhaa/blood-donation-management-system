<!DOCTYPE html>
<html>
<head>
    <title>Edit Donor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-danger">
    <div class="container">
        <span class="navbar-brand">Blood Bank</span>
    </div>
</nav>

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3>Edit Donor</h3>
        <form method="POST">
            <input type="text" name="name" class="form-control mb-3" value="{{ donor[1] }}">
            <input type="number" name="age" class="form-control mb-3" value="{{ donor[2] }}">
            <input type="text" name="gender" class="form-control mb-3" value="{{ donor[3] }}">
            <input type="text" name="bloodgroup" class="form-control mb-3" value="{{ donor[4] }}">
            <input type="date" name="lastdonationdate" class="form-control mb-3" value="{{ donor[5] }}">
            <button class="btn btn-success w-100">Update</button>
        </form>
    </div>
</div>

</body>
</html>
