<!DOCTYPE html>
<html>
<head>
    <title>Hospitals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-danger">
    <div class="container">
        <span class="navbar-brand">Blood Bank</span>
        <div>
            <a href="/" class="text-white me-3">Donors</a>
            <a href="/bloodstock" class="text-white me-3">Stock</a>
            <a href="/hospitals" class="text-white me-3">Hospitals</a>
            <a href="/requests" class="text-white">Requests</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between">
        <h3>Hospital List</h3>
        <a href="/add_hospital" class="btn btn-success">Add Hospital</a>
    </div>

    <table class="table table-bordered mt-3 shadow">
        <tr>
            <th>ID</th>
            <th>Hospital Name</th>
        </tr>

        {% for h in hospitals %}
        <tr>
            <td>{{ h[0] }}</td>
            <td>{{ h[1] }}</td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
