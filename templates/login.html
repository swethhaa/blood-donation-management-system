<!DOCTYPE html>
<html>
<head>
    <title>Login - BloodNet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="text-center text-danger mb-4">BloodNet Login</h3>
                    
                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}

                    {% if request.args.get('message') %}
                    <div class="alert alert-success">{{ request.args.get('message') }}</div>
                    {% endif %}

                    <form action="/login" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 mb-3">Login</button>
                    </form>
                    
                    <div class="text-center mb-3">
                        <span class="text-muted">Hospital?</span> 
                        <a href="/signup" class="text-danger fw-bold text-decoration-none">Sign Up here</a>
                    </div>
                    
                    <div class="text-center mt-3 text-muted small">
                        Admin Login: <b>admin</b> / <b>admin123</b>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
