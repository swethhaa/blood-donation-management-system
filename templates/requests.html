<!DOCTYPE html>
<html>
<head>
    <title>Blood Requests</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-danger">
    <div class="container">
        <span class="navbar-brand">Blood Bank</span>
        <div>
            <a href="/" class="text-white me-3">Donors</a>
            <a href="/bloodstock" class="text-white me-3">Stock</a>
            <a href="/hospitals" class="text-white me-3">Hospitals</a>
            <a href="/requests" class="text-white">Requests</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between">
        <h3>Blood Requests</h3>
        <a href="/add_request" class="btn btn-success">New Request</a>
    </div>

    <table class="table table-bordered mt-3 shadow">
        <tr>
            <th>ID</th>
            <th>Blood Group</th>
            <th>Units</th>
            <th>Status</th>
        </tr>

        {% for r in requests %}
        <tr>
            <td>{{ r[0] }}</td>
            <td>{{ r[1] }}</td>
            <td>{{ r[2] }}</td>
            <td>
                {% if r[4] == 'Approved' %}
                    <span class="badge bg-success">Approved</span>
                {% else %}
                    <span class="badge bg-danger">Rejected</span>
                {% endif %}
            </td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
